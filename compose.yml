services:
  console:
    container_name: trade-gateway-devcontainer
    user: vscode
    build:
      context: ./console
      dockerfile: Dockerfile
    tty: true
    init: true
    volumes:
      - ./:/workspace
      - console-node-modules:/workspace/app/node_modules
    environment:
      - FIRESTORE_EMULATOR_HOST=trade-gateway-firebase:8080

  app:
    container_name: trade-gateway-app
    image: node:24-trixie
    volumes:
      - ./app:/app
      - app-node-modules:/app/node_modules
    working_dir: /app
    command: bash -c "npm install && npm run dev"
    environment:
      - FIRESTORE_EMULATOR_HOST=trade-gateway-firebase:8080

  firebase:
    container_name: trade-gateway-firebase
    build:
      context: ./firebase
      dockerfile: Dockerfile
    volumes:
      - ./firebase/.firebaserc:/firebase/.firebaserc
      - ./firebase/firebase.json:/firebase/firebase.json
    tty: true
    working_dir: /firebase
    command: firebase emulators:start

volumes:
  app-node-modules:
  console-node-modules:
